<!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Page Not Found | Ali Camur Photography</title>
<meta name="robots" content="noindex, follow" />
<link rel="icon" type="image/png" href="/assets/image/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #0A0A0A;
--warm-white: #F0EDE8;
  --gold: #C9A84C;
  --grey: #2A2A2A;
--mid-grey: #888888;
}
body {
  background: var(--black);
color: var(--warm-white);
font-family: 'Montserrat', sans-serif;
font-weight: 300;
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
padding: 2rem 1.5rem;
text-align: center;
}
.wrap { max-width: 520px; }
img.logo { height: 40px; margin-bottom: 2.4rem; }
.eyebrow {
  font-size: 10px;
font-weight: 500;
letter-spacing: 0.3em;
text-transform: uppercase;
color: var(--gold);
margin-bottom: 1.4rem;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
font-weight: 300;
font-size: clamp(2rem, 5vw, 2.8rem);
line-height: 1.2;
margin-bottom: 1.2rem;
}
h1 em { font-style: normal; color: var(--gold); }
p.sub {
color: var(--mid-grey);
font-size: 0.95rem;
line-height: 1.7;
margin-bottom: 2.4rem;
}
.actions { display: flex; gap: 0.85rem; justify-content: center; flex-wrap: wrap; }
.btn {
  display: inline-block;
font-family: 'Montserrat', sans-serif;
font-weight: 500;
font-size: 10px;
letter-spacing: 0.2em;
text-transform: uppercase;
padding: 0.95rem 1.8rem;
text-decoration: none;
transition: all 0.3s ease;
}
.btn--gold { background: var(--gold); color: var(--black); border: 1px solid var(--gold); }
.btn--gold:hover { opacity: 0.85; }
.btn--outline { background: transparent; color: var(--mid-grey); border: 1px solid var(--grey); }
.btn--outline:hover { border-color: var(--gold); color: var(--gold); }
</style>
  </head>
  <body>
  <div class="wrap">
  <img class="logo" src="/assets/image/logo.png" alt="Ali Camur Photography">
  <div class="eyebrow">404</div>
  <h1>This page has <em>faded to black.</em></h1>
  <p class="sub">The page you're looking for doesn't exist or has moved. Let's get you back to the gallery.</p>
  <div class="actions">
  <a href="/" class="btn btn--gold">Back to Gallery</a>
  <a href="/#contact" class="btn btn--outline">Contact</a>
  </div>
  </div>
  </body>
  </html>
